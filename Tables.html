<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tables</title>
    <style>
        .center{
            text-align: center;
            color: black;
            background-color: aqua;
            margin: 0 auto;
            width: 800px;
            padding: 8px;
            margin-bottom: 20px;
        }
        table{
            background-color: black;
            margin: 0 auto;
          
        }
        th{
            background-color: aqua;
            margin: 0 auto;
        }
        td{
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <h2 class = "center"> Student Marks details </h2>
    
    <table border="1">
    <tr align="center">
        <th>RolloNo</th>
         <th>Student Name</th>
          <th>Marks</th>
    </tr>
    <tr align="center">
        <td>1</td>
        <td>Amit</td>
        <td>85</td>
    </tr>
    <tr align="center">
        <td>2</td>
        <td>Riya</td>
        <td>95</td>
    </tr>
    </table>
</body>
</html>
