<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border using CSS in HTML</title>
    <style>
        h1{
           /* border-style: solid;
            border-width: 4px;
            border-color: mediumpurple;*/

            /*or*/
            border: 4px solid mediumpurple;
            /*width,style,color this is the order in the above to
            use border 3 at a time*/
            border-radius: 20px;
        }
        p{
           
            border-bottom:3px dotted  rgb(175, 68, 68);
            border-left:4px dotted greenyellow;
            border-right:4px dotted rgb(205, 65, 205);
            border-top:4px dotted orange;
            border-radius: 10px;

        }

    </style>
</head>
<body>
    <h1>Kanki._7</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Temporibus, sint. Esse facere, neque quasi veritatis corporis quae amet libero incidunt porro cupiditate, saepe adipisci molestiae nesciunt. Laudantium placeat blanditiis similique.</p>
</body>
</html>
