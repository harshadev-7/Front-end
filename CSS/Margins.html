<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margins in html</title>
    <style>
        body{
            margin: 0;
        }
        .box{
            width: 200px;
            height: 200px;
            border: 2px solid;
        }
        #box1{
            background-color: aqua;
            margin-bottom: 20px;
            margin-left: 20px;
            margin-right: 30px;
            margin: 20px auto;
        }
        #box2{
            background-color: mediumpurple;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class ="box" id ="box1"> BOX1</div>
    <div class="box" id="box2">BOX2</div>
</body>
</html>
